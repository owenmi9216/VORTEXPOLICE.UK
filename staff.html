<!DOCTYPE html>
<html>
<head>
  <title>Vortex Police • Staff Portal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #061a2b;
      color: #e6f1ff;
    }

    .topbar {
      background: #041421;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #0d2a44;
    }

    .topbar strong {
      color: #00e0ff;
    }

    .topbar button {
      background: #00e0ff;
      border: none;
      padding: 8px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    h1 {
      padding: 20px;
      margin: 0;
      color: #00e0ff;
      border-bottom: 1px solid #0d2a44;
    }

    #applications {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .card {
      background: #0b2a44;
      border: 1px solid #0f3b5c;
      border-radius: 12px;
      padding: 20px;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: #00e0ff;
    }

    .card h3 {
      margin: 0 0 10px;
      color: #00e0ff;
    }

    .card p {
      margin: 5px 0;
      font-size: 14px;
      color: #c9e6ff;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
    }

    .pending { color: orange; }
    .approved { color: lime; }
    .rejected { color: red; }

    .actions {
      margin-top: 15px;
    }

    .actions button {
      margin-right: 5px;
      padding: 6px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
    }

    .approve { background: lime; }
    .reject { background: red; color: white; }
    .delete { background: gray; color: white; }

    .empty {
      padding: 20px;
      color: #7aaacb;
    }
  </style>
</head>

<body>

<!-- 🔐 LOGIN CHECK -->
<script>
  const user = localStorage.getItem("vp_logged_in_user");

  if (!user) {
    window.location.href = "login.html";
  }
</script>

<!-- 🚔 TOP BAR -->
<div class="topbar">
  <strong>🚔 VORTEX POLICE • STAFF</strong>
  <button onclick="logout()">Logout</button>
</div>

<h1>📋 Applications</h1>

<div id="applications"></div>

<script>
  function logout() {
    localStorage.removeItem("vp_logged_in_user");
    window.location.href = "login.html";
  }

  function loadApps() {
    const container = document.getElementById("applications");
    let apps = JSON.parse(localStorage.getItem("vp_applications")) || [];

    if (apps.length === 0) {
      container.innerHTML = "<p class='empty'>No applications yet.</p>";
      return;
    }

    let html = "";

    for (let i = 0; i < apps.length; i++) {
      let app = apps[i];
      let status = app.status || "pending";

      html += `
        <div class="card">
          <h3>${app.fullName}</h3>
          <p><strong>Email:</strong> ${app.email}</p>
          <p><strong>Role:</strong> ${app.role}</p>
          <p><strong>Message:</strong> ${app.experience}</p>

          <div class="status ${status}">
            Status: ${status}
          </div>

          <div class="actions">
            <button class="approve" onclick="updateStatus(${i}, 'approved')">Approve</button>
            <button class="reject" onclick="updateStatus(${i}, 'rejected')">Reject</button>
            <button class="delete" onclick="deleteApp(${i})">Delete</button>
          </div>
        </div>
      `;
    }

    container.innerHTML = html;
  }

  function updateStatus(index, status) {
    let apps = JSON.parse(localStorage.getItem("vp_applications")) || [];
    apps[index].status = status;
    localStorage.setItem("vp_applications", JSON.stringify(apps));
    loadApps();
  }

  function deleteApp(index) {
    let apps = JSON.parse(localStorage.getItem("vp_applications")) || [];
    apps.splice(index, 1);
    localStorage.setItem("vp_applications", JSON.stringify(apps));
    loadApps();
  }

  loadApps();
</script>

</body>
</html>
