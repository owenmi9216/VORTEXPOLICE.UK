<script>
  // 🔐 PASSWORD CHECK
  const password = prompt("Enter staff password:");

  if (password !== "vortex123") {
    document.body.innerHTML = "<h1>Access Denied</h1>";
    throw new Error("Access denied"); // stops everything
  }

  // 📦 LOAD APPLICATIONS
  const container = document.getElementById("applications");

  const applications = JSON.parse(localStorage.getItem("vp_applications")) || [];

  if (applications.length === 0) {
    container.innerHTML = "<p>No applications yet.</p>";
  } else {
    container.innerHTML = applications.map(app => `
      <div class="card">
        <h3>${app.fullName}</h3>
        <p>Email: ${app.email}</p>
        <p>Role: ${app.role}</p>
        <p>Message: ${app.experience}</p>
      </div>
    `).join("");
  }
</script>
