<!DOCTYPE html>
<html>
<head>
  <title>Vortex Police • Staff</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #061a2b;
      color: white;
    }

    .topbar {
      background: #041421;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #0d2a44;
    }

    .topbar button {
      background: #00e0ff;
      border: none;
      padding: 8px 15px;
      border-radius: 6px;
      cursor: pointer;
    }

    h1 {
      padding: 20px;
      color: #00e0ff;
    }

    #applications {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: #0b2a44;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #0f3b5c;
    }
  </style>
</head>

<body>

<!-- 🔐 LOGIN CHECK -->
<script>
  const user = localStorage.getItem("vp_logged_in_user");

  if (user !== "staff") {
    window.location.href = "login.html";
  }
</script>

<div class="topbar">
  <strong>🚔 STAFF PANEL</strong>
  <button onclick="logout()">Logout</button>
</div>

<h1>Applications</h1>

<div id="applications"></div>

<script>
  function logout() {
    localStorage.removeItem("vp_logged_in_user");
    window.location.href = "login.html";
  }

  const container = document.getElementById("applications");

  const applications = JSON.parse(localStorage.getItem("vp_applications")) || [];

  if (applications.length === 0) {
    container.innerHTML = "<p>No applications yet.</p>";
  } else {
    container.innerHTML = applications.map(app => `
      <div class="card">
        <h3>${app.fullName}</h3>
        <p>Email: ${app.email}</p>
        <p>Role: ${app.role}</p>
        <p>Message: ${app.experience}</p>
      </div>
    `).join("");
  }
</script>

</body>
</html>
