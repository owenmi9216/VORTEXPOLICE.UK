<!DOCTYPE html>
<html>
<head>
  <title>Staff Portal</title>
</head>

<body>

  <h1>📋 Applications</h1>

  <div id="applications"></div>

  <script>
    const password = prompt("Enter staff password:");

    if (password !== "miller9216@") {
      document.body.innerHTML = "<h1>Access Denied</h1>";
      throw new Error("Access denied");
    }

    const container = document.getElementById("applications");

    const applications = JSON.parse(localStorage.getItem("vp_applications")) || [];

    if (applications.length === 0) {
      container.innerHTML = "<p>No applications yet.</p>";
    } else {
      container.innerHTML = applications.map(app => `
        <div class="card">
          <h3>${app.fullName}</h3>
          <p>Email: ${app.email}</p>
          <p>Role: ${app.role}</p>
          <p>Message: ${app.experience}</p>
        </div>
      `).join("");
    }
  </script>

</body>
</html>
<head>
  <style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #061a2b;
    color: #e6f1ff;
  }

  h1 {
    padding: 20px;
    border-bottom: 1px solid #0d2a44;
    color: #00e0ff;
  }

  #applications {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  .card {
    background: #0b2a44;
    border: 1px solid #0f3b5c;
    border-radius: 12px;
    padding: 20px;
    transition: 0.2s;
  }

  .card:hover {
    transform: translateY(-5px);
    border-color: #00e0ff;
  }

  .card h3 {
    margin: 0 0 10px;
    color: #00e0ff;
  }

  .card p {
    margin: 5px 0;
    font-size: 14px;
    color: #c9e6ff;
  }
</style>
<head>
