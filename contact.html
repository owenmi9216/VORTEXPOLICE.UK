<!DOCTYPE html>
<html>
<head>
  <title>Vortex Police • Contact</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #061a2b;
      color: #e6f1ff;
    }

    /* NAVBAR */
    header {
      background: #041421;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #0d2a44;
    }

    header h2 {
      color: #00e0ff;
      margin: 0;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #c9e6ff;
    }

    nav a:hover {
      color: #00e0ff;
    }

    /* PAGE */
    .container {
      max-width: 600px;
      margin: 80px auto;
      background: #0b2a44;
      padding: 30px;
      border-radius: 12px;
      border: 1px solid #0f3b5c;
    }

    h1 {
      color: #00e0ff;
      margin-bottom: 10px;
    }

    p {
      color: #9ccfff;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      background: #041421;
      color: white;
    }

    textarea {
      resize: none;
      height: 120px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #00e0ff;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #00bcd4;
    }

    .success {
      margin-top: 10px;
      color: lime;
    }
  </style>
</head>

<body>

<header>
  <h2>🚔 VORTEX POLICE</h2>

  <nav>
    <a href="index.html">Home</a>
    <a href="careers.html">Careers</a>
    <a href="login.html">Portal</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="container">
  <h1>Contact Us</h1>
  <p>For enquiries, support, or general communication.</p>

  <form id="contactForm">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <textarea id="message" placeholder="Your message..." required></textarea>

    <button type="submit">Send Message</button>
  </form>

  <p id="success" class="success"></p>
</div>

<script>
  const form = document.getElementById("contactForm");
  const success = document.getElementById("success");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const msg = {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      message: document.getElementById("message").value
    };

    let messages = JSON.parse(localStorage.getItem("vp_messages")) || [];
    messages.push(msg);

    localStorage.setItem("vp_messages", JSON.stringify(messages));

    success.innerText = "Message sent successfully.";
    form.reset();
  });
</script>

</body>
</html>
