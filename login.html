<!DOCTYPE html>
<html>
<head>
  <title>Vortex Police • Staff Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #041421, #061a2b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #0b2a44;
      padding: 35px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
      border: 1px solid #0f3b5c;
      box-shadow: 0 0 20px rgba(0, 224, 255, 0.1);
    }

    .logo {
      color: #00e0ff;
      font-weight: bold;
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      background: #061a2b;
      color: white;
      outline: none;
    }

    input::placeholder {
      color: #7aaacb;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #00e0ff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
      transition: 0.2s;
    }

    button:hover {
      background: #00bcd4;
    }

    #error {
      margin-top: 10px;
      color: red;
      font-size: 13px;
    }

    .back {
      display: block;
      margin-top: 15px;
      font-size: 12px;
      color: #7aaacb;
      text-decoration: none;
    }

    .back:hover {
      color: #00e0ff;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <div class="logo">🚔 VORTEX POLICE</div>
    <h2>Staff Portal</h2>

    <input type="password" id="password" placeholder="Enter staff password">
    <button onclick="login()">Login</button>

    <p id="error"></p>

    <a href="index.html" class="back">← Back to homepage</a>
  </div>

  <script>
    function login() {
      const pass = document.getElementById("password").value;

      if (pass === "miller9216@") {
        localStorage.setItem("vp_logged_in_user", "staff");
        window.location.href = "staff.html";
      } else {
        document.getElementById("error").innerText = "Incorrect password";
      }
    }
  </script>

</body>
</html>
