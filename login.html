<!DOCTYPE html>
<html>
<head>
  <title>Vortex Police • Staff Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(180deg, #041421, #061a2b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #0b2a44;
      padding: 35px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
      border: 1px solid #0f3b5c;
    }

    .logo {
      color: #00e0ff;
      font-weight: bold;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      background: #061a2b;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #00e0ff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    #error {
      margin-top: 10px;
      color: red;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <div class="logo">🚔 VORTEX POLICE</div>
    <h2>Staff Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="error"></p>
  </div>

  <script>
    // 👮 STAFF ACCOUNTS
    const staffAccounts = [
      { username: "admin", password: "miller9216@", role: "admin" },
      { username: "officer1", password: "police123", role: "officer" },
      { username: "sergeant", password: "secure456", role: "supervisor" }
    ];

    function login() {
      const userInput = document.getElementById("username").value;
      const passInput = document.getElementById("password").value;

      const foundUser = staffAccounts.find(acc =>
        acc.username === userInput && acc.password === passInput
      );

      if (foundUser) {
        localStorage.setItem("vp_logged_in_user", foundUser.username);
        localStorage.setItem("vp_role", foundUser.role);

        window.location.href = "staff.html";
      } else {
        document.getElementById("error").innerText = "Invalid login";
      }
    }
  </script>

</body>
</html>
